<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightCitySMP — Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --surface: #111116;
  --surface-2: #18181f;
  --surface-3: #1f1f28;
  --border: #2a2a35;
  --text: #e8e6e3;
  --text-dim: #7a7880;
  --text-dimmer: #4e4d52;
  --accent: #e8c44a;
  --accent-dim: #e8c44a33;
}

html { scroll-behavior: smooth; }

body {
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

::selection { background: var(--accent); color: #000; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

a { color: inherit; text-decoration: none; }

/* NAV */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(17,17,22,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.server-name {
  font-family: 'Anybody', sans-serif;
  font-weight: 800; font-size: 15px;
  letter-spacing: 0.5px;
}
.server-tag {
  font-size: 10px; font-weight: 600;
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  padding: 2px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 1px;
}
.topbar-links { display: flex; gap: 6px; }
.topbar-links a {
  font-size: 13px; font-weight: 500;
  color: var(--text-dim); padding: 6px 14px;
  border-radius: 6px; transition: all 0.2s;
}
.topbar-links a:hover { color: var(--text); background: var(--surface-3); }
.topbar-links a.active { color: var(--accent); }

/* HERO */
.hero {
  padding: 72px 32px 40px;
  max-width: 680px;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600;
  color: var(--text-dimmer);
  text-transform: uppercase; letter-spacing: 3px;
  margin-bottom: 14px;
}
.hero h1 {
  font-family: 'Anybody', sans-serif;
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 900; line-height: 1.1;
  margin-bottom: 14px;
}
.hero h1 em { font-style: normal; color: var(--accent); }
.hero p {
  font-size: 15px; color: var(--text-dim);
  line-height: 1.6; max-width: 440px;
}

/* SECTION TABS */
.section-tabs {
  display: flex; gap: 2px;
  padding: 0 32px; margin-bottom: 40px;
  border-bottom: 1px solid var(--border);
}
.section-tab {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-dim);
  padding: 12px 20px;
  border: none; border-bottom: 2px solid transparent;
  background: none; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.5px;
  transition: all 0.2s;
}
.section-tab:hover { color: var(--text); }
.section-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* SECTION */
.section-wrap {
  padding: 0 32px 60px;
  max-width: 1200px;
}
.section-label {
  font-family: 'Anybody', sans-serif;
  font-size: 20px; font-weight: 800;
  margin-bottom: 6px;
}
.section-desc {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 28px;
}

/* RANKS GRID */
.ranks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.rank-card {
  position: relative;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.25s, transform 0.25s;
}
.rank-card:hover {
  border-color: var(--card-accent, var(--border));
  transform: translateY(-2px);
}
.rank-card-top {
  height: 4px;
  background: var(--card-accent, var(--border));
  opacity: 0.6; transition: opacity 0.25s;
}
.rank-card:hover .rank-card-top { opacity: 1; }
.rank-card-body { padding: 24px; }
.rank-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 6px;
}
.rank-icon { font-size: 28px; line-height: 1; }
.rank-icon img { width: 28px; height: 28px; object-fit: contain; }
.rank-name {
  font-family: 'Anybody', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--card-accent, var(--text));
}
.rank-pop {
  font-size: 9px; font-weight: 700;
  background: var(--card-accent); color: #000;
  padding: 2px 7px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-left: auto;
}
.rank-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 20px;
}
.rank-features {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 24px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.rank-feat {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-dim);
}
.rank-feat::before {
  content: ''; width: 5px; height: 5px;
  border-radius: 50%; flex-shrink: 0;
  background: var(--card-accent, var(--text-dimmer));
}
.rank-bottom {
  display: flex; align-items: center; justify-content: space-between;
}
.rank-price {
  font-family: 'Anybody', sans-serif;
  font-size: 28px; font-weight: 900;
}
.rank-price small {
  font-size: 13px; font-weight: 400;
  color: var(--text-dimmer); margin-left: 2px;
}
.rank-buy {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 10px 22px; border-radius: 7px;
  border: none; cursor: pointer; transition: all 0.2s;
}
.rank-buy.filled {
  background: var(--card-accent); color: #000;
}
.rank-buy.filled:hover { filter: brightness(1.15); }
.rank-buy.ghost {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.rank-buy.ghost:hover {
  border-color: var(--card-accent, var(--text-dim));
  color: var(--text);
}

/* CRATES GRID */
.crates-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.crate-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 24px;
  transition: border-color 0.25s, transform 0.25s;
  display: flex; flex-direction: column;
}
.crate-card:hover {
  border-color: var(--crate-color, var(--border));
  transform: translateY(-2px);
}
.crate-top-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
}
.crate-icon { font-size: 32px; line-height: 1; }
.crate-icon img { width: 32px; height: 32px; object-fit: contain; }
.crate-name {
  font-family: 'Anybody', sans-serif;
  font-size: 16px; font-weight: 800;
  color: var(--crate-color, var(--text));
}
.crate-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5; margin-bottom: 16px; flex: 1;
}
.crate-loot-label {
  font-size: 10px; font-weight: 700;
  color: var(--text-dimmer);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.crate-items {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 20px;
}
.crate-item {
  font-size: 11px; font-weight: 500;
  color: var(--text-dim);
  background: var(--surface-3);
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.03);
}
.crate-bottom {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.crate-price {
  font-family: 'Anybody', sans-serif;
  font-size: 22px; font-weight: 900;
}
.crate-price small {
  font-size: 12px; font-weight: 400;
  color: var(--text-dimmer); margin-left: 2px;
}
.crate-buy {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600;
  padding: 8px 18px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.crate-buy:hover {
  border-color: var(--crate-color, var(--text-dim));
  color: var(--text);
}

/* FOOTER */
.site-footer {
  border-top: 1px solid var(--border);
  padding: 24px 32px;
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-dimmer);
}

/* FADE */
.fade-in {
  opacity: 0; transform: translateY(12px);
  animation: fadeIn 0.4s ease forwards;
}
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

/* MOBILE */
@media (max-width: 640px) {
  .topbar { padding: 0 16px; }
  .topbar-links a { padding: 6px 10px; font-size: 12px; }
  .hero { padding: 48px 16px 28px; }
  .section-tabs { padding: 0 16px; overflow-x: auto; }
  .section-wrap { padding: 0 16px 48px; }
  .ranks-grid, .crates-grid { grid-template-columns: 1fr; }
  .site-footer { flex-direction: column; gap: 6px; padding: 20px 16px; text-align: center; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="server-name" id="navName"></span>
    <span class="server-tag" id="navTag"></span>
  </div>
  <div class="topbar-links">
    <a href="#" class="active" data-tab="ranks">Ranks</a>
    <a href="#" data-tab="crates">Crates</a>
    <a href="#" id="discordLink" target="_blank">Discord</a>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow" id="heroEyebrow"></div>
  <h1 id="heroTitle"></h1>
  <p id="heroSub"></p>
</div>

<div class="section-tabs" id="sectionTabs">
  <button class="section-tab active" data-section="ranks">Ranks</button>
  <button class="section-tab" data-section="crates">Crates</button>
</div>

<div class="section-wrap" id="ranksSection">
  <div class="section-label">Ranks</div>
  <div class="section-desc">Permanent upgrades that stick with you all season.</div>
  <div class="ranks-grid" id="ranksGrid"></div>
</div>

<div class="section-wrap" id="cratesSection" style="display:none;">
  <div class="section-label">Crates</div>
  <div class="section-desc">Try your luck — keys are applied to your account instantly.</div>
  <div class="crates-grid" id="cratesGrid"></div>
</div>

<div class="site-footer">
  <span id="footerText"></span>
  <span>Not affiliated with Mojang Studios</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  LIGHTCITYSMP STORE CONFIG — Edit everything here
// ═══════════════════════════════════════════════════════════════════

const CONFIG = {

  // ── General ────────────────────────────────────────────────
  serverName: "LightCitySMP",
  season: "Season 4",
  heroTitle: 'Server <em>Store</em>',      // wrap text in <em> for accent color
  heroSub: "Grab a rank or try your luck with crates. All purchases are applied instantly.",
  discordLink: "#",                         // your Discord invite URL

  // ── Ranks ──────────────────────────────────────────────────
  // icon: emoji OR image URL ("https://...")
  // color: hex accent color for the card
  // popular: set one rank to true for the badge (or none)
  ranks: [
    {
      id: "iron",
      name: "Iron",
      icon: "⛏️",
      price: 4.99,
      color: "#a0a0a0",
      popular: false,
      description: "Essential perks for a head start. Clean and simple.",
      features: [
        "Iron chat prefix",
        "/hat command",
        "2 home locations",
        "Colored chat",
        "Iron kit (24h cooldown)",
      ],
    },
    {
      id: "gold",
      name: "Gold",
      icon: "👑",
      price: 9.99,
      color: "#e8c44a",
      popular: true,
      description: "The go-to pick. More homes, more commands, priority access.",
      features: [
        "Everything in Iron",
        "Gold chat prefix",
        "5 home locations",
        "/fly in lobby",
        "Gold kit (12h cooldown)",
        "/nick command",
        "Priority queue",
      ],
    },
    {
      id: "diamond",
      name: "Diamond",
      icon: "💎",
      price: 19.99,
      color: "#5cb8e4",
      popular: false,
      description: "Full access. Fly anywhere, custom trails, the works.",
      features: [
        "Everything in Gold",
        "Diamond chat prefix",
        "10 home locations",
        "/fly everywhere",
        "Diamond kit (6h cooldown)",
        "Custom join message",
        "Particle effects & trails",
        "Priority support",
      ],
    },
    // ── Add more ranks: copy a block above, paste here, edit values ──
  ],

  // ── Crates ─────────────────────────────────────────────────
  // icon: emoji OR image URL
  // color: hex accent color
  // items: array of possible loot shown as tags
  // price: set to 0 to display "Free"
  crates: [
    {
      id: "vote",
      name: "Vote Crate",
      icon: "📦",
      price: 0,
      color: "#6ec87a",
      description: "Earned by voting for the server. One key per vote.",
      items: ["Iron Ingots", "Gold Ingots", "Diamonds", "XP Bottles", "Enchanted Books"],
    },
    {
      id: "rare",
      name: "Rare Crate",
      icon: "🔮",
      price: 2.99,
      color: "#a97ee6",
      description: "Better odds, better loot. Includes exclusive enchants.",
      items: ["Diamond Gear", "Netherite Scrap", "Custom Enchants", "Spawner Shards", "Rare Keys"],
    },
    {
      id: "legendary",
      name: "Legendary Crate",
      icon: "⚡",
      price: 5.99,
      color: "#e8c44a",
      description: "Top-tier drops. Spawners, custom items, and cosmetics.",
      items: ["Spawners", "Custom Weapons", "Fly Time", "Cosmetic Trails", "Rank Upgrades", "Elytras"],
    },
    // ── Add more crates: copy a block above, paste here, edit values ──
  ],
};

// ═══════════════════════════════════════════════════════════════════


(function() {
  document.getElementById("navName").textContent = CONFIG.serverName;
  document.getElementById("navTag").textContent = CONFIG.season;
  document.getElementById("discordLink").href = CONFIG.discordLink;
  document.getElementById("heroEyebrow").textContent = CONFIG.serverName + " · " + CONFIG.season;
  document.getElementById("heroTitle").innerHTML = CONFIG.heroTitle;
  document.getElementById("heroSub").textContent = CONFIG.heroSub;
  document.getElementById("footerText").textContent = "© " + new Date().getFullYear() + " " + CONFIG.serverName;

  var rg = document.getElementById("ranksGrid");
  CONFIG.ranks.forEach(function(r, i) { rg.appendChild(mkRank(r, i)); });

  var cg = document.getElementById("cratesGrid");
  CONFIG.crates.forEach(function(c, i) { cg.appendChild(mkCrate(c, i)); });

  // Tabs
  var tabs = document.querySelectorAll(".section-tab");
  var navLinks = document.querySelectorAll(".topbar-links a[data-tab]");
  var rs = document.getElementById("ranksSection");
  var cs = document.getElementById("cratesSection");

  function go(s) {
    tabs.forEach(function(t) { t.classList.toggle("active", t.dataset.section === s); });
    navLinks.forEach(function(l) { l.classList.toggle("active", l.dataset.tab === s); });
    rs.style.display = s === "ranks" ? "" : "none";
    cs.style.display = s === "crates" ? "" : "none";
    var cards = document.querySelectorAll(s === "ranks" ? ".rank-card" : ".crate-card");
    cards.forEach(function(c, i) {
      c.style.animation = "none"; c.offsetHeight;
      c.style.animation = ""; c.style.animationDelay = (i * 0.07) + "s";
    });
  }
  tabs.forEach(function(t) { t.onclick = function() { go(t.dataset.section); }; });
  navLinks.forEach(function(l) {
    l.onclick = function(e) { if (l.dataset.tab) { e.preventDefault(); go(l.dataset.tab); } };
  });
})();

function mkRank(r, i) {
  var d = document.createElement("div");
  d.className = "rank-card fade-in";
  d.style.animationDelay = (i * 0.07) + "s";
  d.style.setProperty("--card-accent", r.color);
  var ic = (r.icon.indexOf && r.icon.indexOf("http") === 0)
    ? '<img src="'+r.icon+'" alt="'+r.name+'">' : r.icon;
  var fl = ""; r.features.forEach(function(f) { fl += '<div class="rank-feat">'+f+'</div>'; });
  d.innerHTML =
    '<div class="rank-card-top"></div><div class="rank-card-body">'+
    '<div class="rank-header"><div class="rank-icon">'+ic+'</div>'+
    '<div class="rank-name">'+r.name+'</div>'+
    (r.popular?'<span class="rank-pop">Popular</span>':'')+
    '</div><div class="rank-desc">'+r.description+'</div>'+
    '<div class="rank-features">'+fl+'</div>'+
    '<div class="rank-bottom"><div class="rank-price">$'+r.price.toFixed(2)+
    '<small>USD</small></div><button class="rank-buy '+(r.popular?'filled':'ghost')+
    '">Purchase</button></div></div>';
  return d;
}

function mkCrate(c, i) {
  var d = document.createElement("div");
  d.className = "crate-card fade-in";
  d.style.animationDelay = (i * 0.07) + "s";
  d.style.setProperty("--crate-color", c.color);
  var ic = (c.icon.indexOf && c.icon.indexOf("http") === 0)
    ? '<img src="'+c.icon+'" alt="'+c.name+'">' : c.icon;
  var il = ""; c.items.forEach(function(t) { il += '<span class="crate-item">'+t+'</span>'; });
  var pr = c.price === 0 ? "Free" : "$"+c.price.toFixed(2)+"<small>USD</small>";
  d.innerHTML =
    '<div class="crate-top-row"><div class="crate-icon">'+ic+'</div>'+
    '<div class="crate-name">'+c.name+'</div></div>'+
    '<div class="crate-desc">'+c.description+'</div>'+
    '<div class="crate-loot-label">Possible Loot</div>'+
    '<div class="crate-items">'+il+'</div>'+
    '<div class="crate-bottom"><div class="crate-price">'+pr+'</div>'+
    (c.price>0?'<button class="crate-buy">Buy Key</button>':'')+
    '</div>';
  return d;
}
</script>
</body>
</html>
